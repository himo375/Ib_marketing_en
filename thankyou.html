<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — IB Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; margin:0; background:#1C3461; min-height:100vh; display:flex; flex-direction:column; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes confetti {
      0%   { transform:translateY(-10px) rotate(0deg);   opacity:1; }
      100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
    }
    .confetti-piece {
      position:fixed; top:-20px; width:10px; height:10px; border-radius:2px;
      animation:confetti 3s ease-in forwards;
    }
    .card-anim   { animation:fadeUp .6s ease forwards; }
    .check-anim  { animation:pulse 1s ease .5s both; }
  </style>
</head>
<body>

  <!-- Confetti container -->
  <div id="confetti"></div>

  <!-- Background decorations -->
  <div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;top:-100px;right:-100px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(30,95,168,.5),transparent 70%);"></div>
    <div style="position:absolute;bottom:-100px;left:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,68,26,.25),transparent 70%);"></div>
    <div style="position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:28px 28px;"></div>
  </div>

  <!-- Main content -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;">
    <div class="card-anim" style="background:#fff;border-radius:24px;max-width:540px;width:100%;padding:56px 48px;text-align:center;box-shadow:0 32px 100px rgba(0,0,0,.25),0 8px 32px rgba(0,0,0,.15);">

      <!-- Checkmark -->
      <div class="check-anim" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#E8441A,#ff6b3d);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;box-shadow:0 12px 40px rgba(232,68,26,.4);">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <!-- Logo -->
      <img src="brand_assets/Light Background.png" alt="IB Marketing" style="height:40px;width:auto;margin:0 auto 28px;">

      <h1 style="font-family:'Montserrat',sans-serif;font-size:2rem;font-weight:900;color:#1C3461;letter-spacing:-.03em;line-height:1.15;margin-bottom:16px;">
        You're on the List! 🎉
      </h1>
      <p style="color:#6b7280;line-height:1.75;font-size:1.0625rem;margin-bottom:8px;">
        Thank you for reaching out to <strong style="color:#1C3461;">IB Marketing</strong>. We've received your request and will be in touch within <strong style="color:#E8441A;">24 hours</strong>.
      </p>
      <p style="color:#9ca3af;line-height:1.75;font-size:.9375rem;margin-bottom:36px;">
        In the meantime, feel free to reach us directly:
      </p>

      <!-- Contact pills -->
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:40px;">
        <a href="mailto:info@ibrahim-marketing.com"
           style="display:flex;align-items:center;justify-content:center;gap:10px;background:#F8F7F5;border-radius:12px;padding:14px 20px;text-decoration:none;color:#1C3461;font-weight:600;font-size:.9375rem;border:1px solid rgba(28,52,97,.1);transition:all .2s ease;"
           onmouseover="this.style.background='#1C3461';this.style.color='#fff';"
           onmouseout="this.style.background='#F8F7F5';this.style.color='#1C3461';">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          info@ibrahim-marketing.com
        </a>
        <a href="tel:+16474909182"
           style="display:flex;align-items:center;justify-content:center;gap:10px;background:#E8441A;border-radius:12px;padding:14px 20px;text-decoration:none;color:#fff;font-weight:600;font-size:.9375rem;box-shadow:0 6px 24px rgba(232,68,26,.35);transition:all .2s ease;"
           onmouseover="this.style.background='#d43d17';"
           onmouseout="this.style.background='#E8441A';">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          +1 647 490 9182
        </a>
      </div>

      <a href="index.html"
         style="display:inline-block;color:#6b7280;font-size:.875rem;text-decoration:none;border-bottom:1px dashed #d1d5db;transition:color .2s ease;"
         onmouseover="this.style.color='#E8441A';"
         onmouseout="this.style.color='#6b7280';">
        ← Back to homepage
      </a>
    </div>
  </div>

  <!-- Footer note -->
  <div style="text-align:center;padding:16px;position:relative;">
    <p style="color:rgba(255,255,255,.3);font-size:.75rem;font-family:'Montserrat',sans-serif;">© 2025 Ibrahim Marketing. All rights reserved.</p>
  </div>

  <script>
    // Confetti burst
    const colors = ['#E8441A','#1E5FA8','#fff','#ffb347','#1C3461'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay = (Math.random() * 2) + 's';
      el.style.animationDuration = (2 + Math.random() * 2) + 's';
      el.style.width  = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      container.appendChild(el);
    }
  </script>
</body>
</html>
